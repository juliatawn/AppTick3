stages:
  - verify
  - integration

default:
  image: eclipse-temurin:17-jdk
  variables:
    ANDROID_SDK_ROOT: "$CI_PROJECT_DIR/android-sdk"
    ANDROID_HOME: "$CI_PROJECT_DIR/android-sdk"
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  cache:
    key: "gradle-${CI_COMMIT_REF_SLUG}"
    paths:
      - .gradle/
      - android-sdk/
  before_script:
    - apt-get update -y
    - apt-get install -y wget unzip
    - mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
    - wget -q https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip -O /tmp/cmdline-tools.zip
    - unzip -qo /tmp/cmdline-tools.zip -d /tmp/android-cmdline-tools
    - rm -rf "$ANDROID_SDK_ROOT/cmdline-tools/latest"
    - mv /tmp/android-cmdline-tools/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
    - export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
    - yes | sdkmanager --licenses > /dev/null
    - sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

host_tests:
  stage: verify
  script:
    - ./gradlew --no-daemon ciHost
  artifacts:
    when: always
    reports:
      junit:
        - app/build/test-results/testDebugUnitTest/*.xml
    paths:
      - app/build/reports/tests/testDebugUnitTest/
      - app/build/reports/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

device_tests:
  stage: integration
  tags:
    - android-emulator
  script:
    - ./gradlew --no-daemon ciDevice
  artifacts:
    when: always
    paths:
      - app/build/reports/androidTests/
      - app/build/outputs/androidTest-results/
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never
